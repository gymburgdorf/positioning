<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
            }

            h1 {
                text-align: center;
            }

            svg {
                width: 100%;
                max-width: 1200px;
                height: auto;
                display: block;
                margin: 0 auto;
            }

            #speed {
                margin-top: 12px;
                text-align: center;
                font-size: 18px;
            }
        </style>
    </head>

    <body>
        <h1> SBB Speed </h1>
        <svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
            <line x1="0" y1="300" x2="1200" y2="300" stroke="#cccccc" stroke-width="1"></line>
            <circle id="pos" cx="150" cy="10" r="2.5" fill="red"></circle>
            <g id="speedTrail"></g>
        </svg>
        
        <div id="speed">
            <div>Speed: <span id="speedkmh"></span> km/h</div>
        </div>

        <script type="module">
            import { registerLocationHandler } from "./getLocation.js";

            const speedkmh = document.getElementById("speedkmh");
            const speedTrail = document.getElementById("speedTrail");
            const svgWidth = 1200;
            const svgHeight = 300;
            const stepPx = 2;
            let currentSpeedKmh = 0;
            let circleIndex = 0;
            let tickCount = 0;

            function addSpeedCircle(speedKmh) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                const x = svgWidth - (circleIndex * stepPx);
                const y = Math.max(0, Math.min(svgHeight, svgHeight - speedKmh));

                circle.setAttribute("cx", x);
                circle.setAttribute("cy", y);
                circle.setAttribute("r", 2.5);
                circle.setAttribute("fill", "#2e86de");

                speedTrail.appendChild(circle);
                circleIndex += 1;
            }

            setInterval(() => {
                tickCount += 1;
                speedkmh.textContent = currentSpeedKmh.toFixed(1);

                if (tickCount % 2 === 0) {
                    addSpeedCircle(currentSpeedKmh);
                }
            }, 1000);

            function showData(data) {
                const coords = data.coords || {};
                const speedValue = coords.speed === null || coords.speed === undefined ? 0 : coords.speed * 3.6;
                currentSpeedKmh = speedValue;
            }

            registerLocationHandler(showData);
        </script>
    </body>
</html>
