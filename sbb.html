<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
            }

            h1 {
                text-align: center;
            }

            svg {
                width: 100%;
                max-width: 1200px;
                height: 300px;
                display: block;
                margin: 0 auto;
            }

            #speedwrap {
                margin-top: 12px;
                text-align: center;
                font-size: 18px;
            }

            #locationName {
                margin-top: 4px;
                font-size: 15px;
                color: #4b5563;
            }

            #train {
                position: fixed;
                bottom: 20px;
                left: 0;
                font-size: 90px;
                cursor: pointer;
                user-select: none;
                z-index: 10;
            }
        </style>
    </head>

    <body>
        <h1> SBB Speed </h1>
        <svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
            <line x1="0" y1="300" x2="1200" y2="300" stroke="#cccccc" stroke-width="1"></line>
            <g id="speedTrail"></g>
        </svg>

        <div id="train" title="Zur SBB" onclick="window.open('https://www.sbb.ch', '_blank')">🚂</div>

        <div id="speedwrap">
            <div>Speed: <span id="speedkmh"></span> km/h</div>
            <div id="locationName">Locating city…</div>
        </div>

        <script type="module">
            import { registerLocationHandler } from "./getLocation.js";

            const speedTrail = document.getElementById("speedTrail");
            const locationName = document.getElementById("locationName");
            const svgWidth = 1200;
            const svgHeight = 300;
            const stepPx = 1;
            let currentSpeedKmh = 0;
            let circleIndex = 0;
            let tickCount = 0;

            async function lookupLocationName(lat, lon) {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=10&addressdetails=1`);
                    const data = await response.json();
                    const address = data.address || {};
                    const city = address.city || address.town || address.village || address.municipality || address.county || "Unknown place";
                    locationName.textContent = city;
                } catch (error) {
                    locationName.textContent = "Location unavailable";
                }
            }

            function addSpeedCircle(speedKmh) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                const x = 40 + circleIndex * stepPx;
                const y = Math.max(0, Math.min(svgHeight, svgHeight - speedKmh));

                circle.setAttribute("cx", x);
                circle.setAttribute("cy", y);
                circle.setAttribute("r", 2.5);
                circle.setAttribute("fill", "#2e86de");

                speedTrail.appendChild(circle);
                circleIndex += 1;
            }

            setInterval(() => {
                tickCount += 1;
                document.getElementById("speedkmh").textContent = currentSpeedKmh.toFixed(1);

                if (tickCount % 1 === 0) {
                    addSpeedCircle(currentSpeedKmh);
                }
            }, 1000);

            function showData(data) {
                const coords = data.coords || {};
                const speedValue = coords.speed === null || coords.speed === undefined ? 0 : coords.speed * 3.6;
                currentSpeedKmh = speedValue;
                document.getElementById("speedkmh").textContent = speedValue.toFixed(1);

                if (coords.latitude !== undefined && coords.longitude !== undefined) {
                    lookupLocationName(coords.latitude, coords.longitude);
                }
            }

            registerLocationHandler(showData);

            const train = document.getElementById("train");
            let trainX = -150;
            let lastFrameTime = performance.now();

            function moveTrain(now) {
                const dt = (now - lastFrameTime) / 1000;
                lastFrameTime = now;

                const pxPerSecond = 30 + currentSpeedKmh * 5;
                trainX += pxPerSecond * dt;

                if (trainX > window.innerWidth + 150) {
                    trainX = -150;
                }

                train.style.transform = `translateX(${trainX}px) scaleX(-1)`;
                requestAnimationFrame(moveTrain);
            }

            requestAnimationFrame(moveTrain);
        </script>
    </body>
</html>
