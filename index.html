<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title> Geo Location </title>
        <script src="https://mint.gymburgdorf.ch/dev/demo/ws_demo_marius/WS.js" type="module"></script>
    </head>
    <body id="app">
        <style>
            body {
                background-color: #d2b48c;
            }
        </style>
        <h1> Geolocation </h1>
        <div>Zeit: <span id="timestamp"></span></div>
        <div id="coords">Koordinaten: <span id="latitude"></span>, <span id="longitude"></span></div>
        <div>Höhe: <span id="altitude"></span> m</div>
        <div>Geschwindigkeit: <span id="speed"></span> m/s</div>
        <div>Geschwindigkeit: <span id="speedkmh" ></span> km/h</div>
        <div>Distanz zu Freund*in: <span id="distance"></span> m</div>
        <br>
	    <input id="groupInput" placeholder="group">
	    <input id="userInput" placeholder="user">
        <button id="connectButton">Connect</button>
        <br>
        <div id="data"> Hier werden die Benutzenden angezeigt</div>
        <div id="wherefriend">Hier werden die Koordinaten deiner Freund*innen angezeigt</div>

        <script type="module">
            import { registerLocationHandler, getDistance } from "./getLocation.js";
            import { renderData } from "./connectWS.js";
            let ws = null;

            function showData(data) {
                console.log(data);

                document.getElementById("latitude").textContent = data.coords.latitude;
                document.getElementById("longitude").textContent = data.coords.longitude;
                document.getElementById("altitude").textContent = Math.round(data.coords.altitude * 10000) / 10000;
                document.getElementById("speed").textContent = Math.round(data.coords.speed * 100) / 100;
                const speedkmh = data.coords.speed === null ? null : data.coords.speed * 3.6;
                document.getElementById("speedkmh").textContent = Math.round(speedkmh * 100) / 100;
                let time = (data.timestamp % 86400000) / 3600000 + 2
                let hours = Math.floor(time)
                let minutes = (time % 1)*60
                document.getElementById("timestamp").textContent = hours + ":" + Math.floor(minutes);
                let x1 = data.coords.lattitude
                let y1 = data.coords.longitude
                let x2 = renderData.lat
                let y2 = renderData.lng
                let distance = getDistance(y1, x1, y2, x2)
                document.getElementById("distance").textContent = Math.round(distance * 100) / 100;
                
                if (ws) {
                    ws.sendToAll(JSON.stringify({ user: userName, lat: data.coords.latitude, lng: data.coords.longitude }));
                }
            }

            let groupName = "provgroup";
            groupInput.value = groupName
	        groupInput.addEventListener("input", (event)=> {
		        groupName = event.target.value
	        })
            let userName = "provuser";
            userInput.value = userName
            userInput.addEventListener("input", (event)=> {
		        userName = event.target.value
	        })
            async function connect() {
                ws = await WS.connect(groupName, userName);
                app.classList.add("connected")
                ws.onMessage(renderData);
                ws.onUserStatus(showUsers);
                ws.getUsers();
            }
            function renderData(friendData) {
                console.log("string friendData:", friendData.data);
                const fdataobject = JSON.parse(friendData.data);
                console.log("object:", fdataobject);
                const user = fdataobject.user;
                const lat = fdataobject.lat;
                const lng = fdataobject.lng;
                let target = document.getElementById("wherefriend")
                if (document.getElementById(user)) {
                    document.getElementById(user).textContent = `${user} - Lat: ${lat}, Lng: ${lng}`;
                } else {
                    target.insertAdjacentHTML('beforeEnd', `<div id="${user}">${user} - Lat: ${lat}, Lng: ${lng}</div>`);
                } 
            }
            connectButton.addEventListener("click", connect)
            function showUsers(userlist) {
                document.getElementById("data").textContent = JSON.stringify(userlist);
                console.log("userlist:", window.parent.userlist);
                console.log("userpositions:", window.parent.userPositions);


            }
            setInterval(showUsers, 1000);
            


            registerLocationHandler(showData);
        </script>
    </body>
</html>
