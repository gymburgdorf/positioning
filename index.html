<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title> Geo Location </title>
    </head>
    <body>
        <h1> Geolocation </h1>
        Created by: Kaspar, Marius, Nils, Jael
        <div id="result"> </div>
        <div id="constant"> </div>

        <script type="module">
            import { registerLocationHandler } from "./getLocation.js";

            function showData(data) {
                document.getElementById("constant").textContent = JSON.stringify(data)
            }

            registerLocationHandler(showData);
        </script>
    </body>
