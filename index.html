<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title> Geo Location </title>
        <script src="https://mint.gymburgdorf.ch/dev/demo/ws_demo_marius/WS.js" type="module"></script>
    </head>
    <body id="app">
        <style>
            body {
                background-color: #d2b48c;
            }
        </style>
        <div id="result"> </div>
        <div id="coords">Coordinates: <span id="latitude"></span>, <span id="longitude"></span></div>
        <div>Alt: <span id="altitude"></span></div>
        <div>Speed: <span id="speed"></span> m/s</div>
        <div>Speed: <span id="speedkmh" ></span> km/h</div>
        <br>
	    <input id="groupInput" placeholder="group">
	    <input id="userInput" placeholder="user">
        <button id="connectButton">Connect</button>
        <br>
        <div id="data"> Hier werden die Benutzer angezeigt</div>
        <div id="wherefriend">Hier werden die Koordinaten der Freunde angezeigt</div>

        <script type="module">
            import { registerLocationHandler } from "./getLocation.js";
            let ws = null;

            function showData(data) {
                console.log(data);

                document.getElementById("latitude").textContent = data.coords.latitude;
                document.getElementById("longitude").textContent = data.coords.longitude;
                document.getElementById("altitude").textContent = Math.round(data.coords.altitude * 10000) / 10000;
                document.getElementById("speed").textContent = Math.round(data.coords.speed * 100) / 100;
                const speedkmh = data.coords.speed === null ? null : data.coords.speed * 3.6;
                document.getElementById("speedkmh").textContent = Math.round(speedkmh * 100) / 100;

                if (ws) {
                    ws.sendToAll(JSON.stringify({ user: userName, lat: data.coords.latitude, lng: data.coords.longitude }));
                }
            }

            let groupName = "provgroup";
            groupInput.value = groupName
	        groupInput.addEventListener("input", (event)=> {
		        groupName = event.target.value
	        })
            let userName = "provuser";
            userInput.value = userName
            userInput.addEventListener("input", (event)=> {
		        userName = event.target.value
	        })
            async function connect() {
                ws = await WS.connect(groupName, userName);
                app.classList.add("connected")
                ws.onMessage(renderData);
                ws.onUserStatus(showUsers);
                ws.getUsers();
            }
            function renderData(friendData) {
                console.log(friendData);
                let target = document.getElementById("wherefriend")
                
                target.insertAdjacentHTML('beforeEnd', `<div>${friendData.userName} - Lat: ${friendData.lat}, Lng: ${friendData.lng}</div>`);
            }
            connectButton.addEventListener("click", connect)
            function showUsers(userlist) {
                document.getElementById("data").textContent = JSON.stringify(userlist);

            }




            registerLocationHandler(showData);
        </script>
    </body>
</html>
