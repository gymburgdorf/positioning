<html>
    <head>
        <style>
            svg {
                width: 100%;
                height: 100%;

            }

            img {
                display: block;
                width: 100%;
                height: 100%;

            }
        </style>
    </head>
    <body>
        <svg viewBox="0 0 300 152.34375" xmlns="http://www.w3.org/2000/svg">
            <image id="mapImage" x="0" y="0" height="152.34375" width="300" href="Burgdorf.png" />
            <circle id = "pos" cx = 150 cy = 10 r = 2.5 fill = red></circle>
        </svg>
        <div id="log">
            
        </div>

        <script type="module">
            const minLat = 47.052979
            const maxLat = 47.0612
            const minLon = 7.610414
            const maxLon = 7.633424
            const wLat = maxLat - minLat
            const wLon = maxLon - minLon
            const h = 152.34375

            import { registerLocationHandler } from "./getLocation.js";

            function showData(data) {
                const lon = data.coords.longitude 
                const lat = data.coords.latitude
                const posX = ((lon - minLon) / wLon) * 300 - 4
                const posY = h - ((lat - minLat) / wLat) * h + 1

                console.log(data.coords.latitude);
                console.log(data.coords.longitude);
                console.log(posX, posY)

                for (user in window.parent.userlist) {
                    console.log({user})
                    let position = window.parent.userPositions[user.username]
                    console.log(position)
                }
                const circle = document.getElementById("pos");
                circle.setAttribute("cx", posX);
                circle.setAttribute("cy", posY);
                // document.getElementById("log").textContent = `${posX}, ${posY}`
            }

            registerLocationHandler(showData);

            function renderOthers() {
                if(!window.parent.userlist) return
                 for (let user in window.parent.userlist) {
                    console.log({user})
                    let position = window.parent.userPositions[user.username]
                    console.log(position)
                }
            }
            setInterval(renderOthers, 3000)
        </script>
    </body>
</html>
