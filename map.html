<html>
    <head>
        <style>
            svg {
                width: 100%;
                height: 100%;

            }

            img {
                display: block;
                width: 100%;
                height: 100%;

            }
        </style>
    </head>
    <body>
        <svg viewBox="0 0 300 152.34375" xmlns="http://www.w3.org/2000/svg">
            <image id="mapImage" x="0" y="0" height="152.34375" width="300" href="Burgdorf.png" />
            <circle id = "pos" cx = 150 cy = 10 r = 2.5 fill = red></circle>
        </svg>
        <div id="log">
            
        </div>

        <script type="module">
            const minLat = 47.052979
            const maxLat = 47.0612
            const minLon = 7.610414
            const maxLon = 7.633424
            const wLat = maxLat - minLat
            const wLon = maxLon - minLon
            const h = 152.34375

            import { registerLocationHandler } from "./getLocation.js";

            const REMOTE_IMAGE_URLS = [
                "https://i.ytimg.com/vi/kClwJxgmrgk/maxresdefault.jpg",
                "https://media1.tenor.com/m/38rXeANdtGUAAAAd/big-yahu.gif",
                "https://images.theconversation.com/files/733524/original/file-20260501-85-vkjin3.jpg?ixlib=rb-4.1.0&rect=289%2C0%2C2721%2C1813&q=50&auto=format&w=768&h=512&fit=crop&dpr=2"
                "https://i.ytimg.com/vi/ng5yP_SVF3U/maxresdefault.jpg"
            ];
            const mapImage = document.getElementById("mapImage");
            if (mapImage && Math.random() < 0.05) {
                const randomIndex = Math.floor(Math.random() * REMOTE_IMAGE_URLS.length);
                mapImage.setAttribute("href", REMOTE_IMAGE_URLS[randomIndex]);
            }

            function showData(data) {
                const lon = 7.610816 //data.coords.longitude 
                const lat = 47.053302 //data.coords.latitude
                const posX = ((lon - minLon) / wLon) * 300
                const posY = h - ((lat - minLat) / wLat) * h

                console.log(data.coords.latitude);
                console.log(data.coords.longitude);
                console.log(posX, posY)
                const circle = document.getElementById("pos");
                circle.setAttribute("cx", posX);
                circle.setAttribute("cy", posY);
                document.getElementById("log").textContent = `x: ${posX}, y: ${posY}`
            }

            registerLocationHandler(showData);
        </script>
    </body>
</html>
