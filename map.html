<html>
    <head>
        <style>
            svg {
                width: 100%;
                height: 100%;

            }

            img {
                display: block;
                width: 100%;
                height: 100%;

            }
        </style>
    </head>
    <body>
        <svg viewBox="0 0 300 152.34375" xmlns="http://www.w3.org/2000/svg">
            <image x="0" y="0" height="152.34375" width="300" href="Burgdorf.png" />
            <circle id = "pos" cx = 1500 cy = 1000 r = 2.5 fill = red></circle>
        </svg>
        <div id="log">
            
        </div>

        <script type="module">
            const zeroY = 47.052979
            const zeroX = 7.610414
            const maxY = 47.061109
            const maxX = 7.633523
            const wX = maxX - zeroX
            const wY = maxY - zeroY
            const h = 152.34375

            import { registerLocationHandler } from "./getLocation.js";

            function showData(data) {
                console.log(data);
                let x = data.coords.longitude
                let y = data.coords.latitude
                let posX = (x - zeroX) / wX * 300
                let posY = (y - zeroY) / wY * h
                console.log(data.coords.latitude);
                console.log(data.coords.longitude);
                console.log(posX, posY)
                let circle = document.getElementById("pos");
                circle.setAttribute("cx", posX);
                circle.setAttribute("cy", h - posY);
                document.getElementById("log").textContent=`x: ${posX}, y:${posY}`
            }

            registerLocationHandler(showData);
        </script>
    </body>
</html>
