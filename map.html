<html>
    <head>
        <style>
            svg {
                width: 100%;
                height: 100%;

            }

            img {
                display: block;
                width: 100%;
                height: 100%;

            }
        </style>
    </head>
    <body>
        <svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
            <image x="0" y="0" height="200" width="300" href="Burgdorf.png" />
            <circle id = "pos" cx = 150 cy = 100 r = 2.5 fill = red></circle>
        </svg>

        <script type="module">
            const zeroX = 47.052979
            const zeroY = 7.610414
            const maxX = 47.060891
            const maxY = 7.633105
            const wX = maxX - zeroX
            const wY = maxY - zeroY

            import { registerLocationHandler } from "./getLocation.js";

            function showData(data) {
                console.log(data);
                let x = zeroX // data.coords.latitude
                let y = zeroY // data.coords.longitude
                let posX = (x - zeroX) / wX * 300
                let posY = (y - zeroY) / wY * 200
                console.log(data.coords.latitude);
                console.log(data.coords.longitude);
                console.log(posX, posY)
                let circle = document.getElementById("pos");
                circle.setAttribute("cx", posX);
                circle.setAttribute("cy", posY);
            }

            registerLocationHandler(showData);
        </script>
    </body>
</html>
