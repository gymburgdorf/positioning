<html>
    <head>
        <style>
            svg {
                width: 100%;
                height: 100%;

            }

            img {
                display: block;
                width: 100%;
                height: 100%;

            }
        </style>
    </head>
    <body>
        <svg viewBox="0 0 300 152.34375" xmlns="http://www.w3.org/2000/svg">
            <image id="mapImage" x="0" y="0" height="152.34375" width="300" href="Burgdorf.png" />
            <circle id = "pos" cx = 1500 cy = 1000 r = 2.5 fill = red></circle>
        </svg>
        <div id="log">
            
        </div>

        <script type="module">
            const zeroX = 47.052979
            const zeroY = 7.610414
            const maxX = 47.061109
            const maxY = 7.633523
            const wX = maxX - zeroX
            const wY = maxY - zeroY
            const h = 152.34375

            import { registerLocationHandler } from "./getLocation.js";

            const REMOTE_IMAGE_URLS = [
                "https://i.ytimg.com/vi/kClwJxgmrgk/maxresdefault.jpg",
                "https://media1.tenor.com/m/38rXeANdtGUAAAAd/big-yahu.gif"
            ];
            const mapImage = document.getElementById("mapImage");
            if (mapImage && Math.random() < 0.05) {
                const randomIndex = Math.floor(Math.random() * REMOTE_IMAGE_URLS.length);
                mapImage.setAttribute("href", REMOTE_IMAGE_URLS[randomIndex]);
            }

            function showData(data) {
                let x = data.coords.longitude
                let y = data.coords.latitude
                let posX = (x - zeroX) / wX * 300
                let posY = (y - zeroY) / wY * h
                console.log(data.coords.latitude);
                console.log(data.coords.longitude);
                console.log(posX, posY)
                let circle = document.getElementById("pos");
                circle.setAttribute("cx", posX);
                circle.setAttribute("cy", h - posY);
                document.getElementById("log").textContent=`x: ${posX}, y:${posY}`
            }

            registerLocationHandler(showData);
        </script>
    </body>
</html>
